<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Model State Control Solver</title>
  <desc id="desc">A simple four-layer Newton architecture diagram.</desc>
  <style>
    .title { font: 700 28px sans-serif; fill: #172033; }
    .label { font: 700 24px sans-serif; fill: #172033; }
    .sub { font: 400 18px sans-serif; fill: #39506b; }
    .foot { font: 400 18px sans-serif; fill: #5d6b82; }
    .box { fill: #f6f8fc; stroke: #8ca0bf; stroke-width: 2.5; rx: 18; }
    .arrow { stroke: #60759a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60759a"/>
    </marker>
  </defs>

  <text x="60" y="48" class="title">Newton week-1: Model / State / Control / Solver</text>

  <rect x="50" y="80" width="240" height="110" rx="18" class="box"/>
  <text x="170" y="125" text-anchor="middle" class="label">Model</text>
  <text x="170" y="158" text-anchor="middle" class="sub">静态结构与参数</text>

  <rect x="335" y="80" width="240" height="110" rx="18" class="box"/>
  <text x="455" y="125" text-anchor="middle" class="label">State</text>
  <text x="455" y="158" text-anchor="middle" class="sub">当前时刻快照</text>

  <rect x="620" y="80" width="240" height="110" rx="18" class="box"/>
  <text x="740" y="125" text-anchor="middle" class="label">Control</text>
  <text x="740" y="158" text-anchor="middle" class="sub">外部驱动输入</text>

  <rect x="905" y="80" width="240" height="110" rx="18" class="box"/>
  <text x="1025" y="125" text-anchor="middle" class="label">Solver</text>
  <text x="1025" y="158" text-anchor="middle" class="sub">一步数值推进</text>

  <path d="M 290 135 L 335 135" class="arrow"/>
  <path d="M 575 135 L 620 135" class="arrow"/>
  <path d="M 860 135 L 905 135" class="arrow"/>

  <text x="600" y="240" text-anchor="middle" class="foot">Go deeper only after mapping a concrete example to these four layers.</text>
</svg>
