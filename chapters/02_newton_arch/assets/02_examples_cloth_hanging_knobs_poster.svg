<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="390" viewBox="0 0 1400 390" role="img" aria-labelledby="title desc">
  <title id="title">cloth_hanging knobs poster</title>
  <desc id="desc">A poster of the main cloth_hanging knobs to vary: solver family, XPBD spring stiffness, and cloth resolution.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 15px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #5b3b8a; }
    .cardA { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
  </style>

  <rect width="1400" height="390" fill="#ffffff"/>
  <text x="50" y="46" class="title">改 `cloth_hanging` 时，先用三个旋钮把“换路”和“调参”分开</text>
  <text x="50" y="76" class="sub">先确认你是在改 solver family、同一 solver 的内部刚度，还是在改 cloth 场景规模。</text>

  <rect x="50" y="120" width="400" height="200" rx="18" class="cardA"/>
  <text x="82" y="158" class="label">旋钮 1: `--solver`</text>
  <text x="82" y="188" class="code">`xpbd / vbd / semi_implicit / style3d`</text>
  <text x="82" y="218" class="body">这是最明显的“换 solver family”动作，</text>
  <text x="82" y="242" class="body">最适合先追 `if self.solver_type == ...` 分支变化。</text>

  <rect x="500" y="120" width="400" height="200" rx="18" class="cardB"/>
  <text x="532" y="158" class="label">旋钮 2: `spring_ke`</text>
  <text x="532" y="188" class="body">这是 XPBD 路线内部的软硬调节，</text>
  <text x="532" y="212" class="body">能帮你清楚地区分“同一路线调参数”和“直接换路线”。</text>

  <rect x="950" y="120" width="400" height="200" rx="18" class="cardC"/>
  <text x="982" y="158" class="label">旋钮 3: `--width / --height`</text>
  <text x="982" y="188" class="body">它主要改布料分辨率和粒子数量，</text>
  <text x="982" y="212" class="body">更像在扩 scene 规模，再连带影响 contacts 和 step 工作量。</text>
</svg>
