<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="320" viewBox="0 0 1440 320" role="img" aria-labelledby="title desc">
  <title id="title">beginner path map</title>
  <desc id="desc">A teaching-compressed reading path through the five stages of the chapter 02 source walkthrough.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="320" fill="#ffffff"/>
  <text x="50" y="46" class="title">Beginner Path: 一次只回答一个新手问题</text>
  <text x="50" y="76" class="sub">这是阅读顺序压缩图，不是新的 runtime layer。</text>

  <rect x="50" y="118" width="240" height="108" rx="18" class="cardA"/>
  <text x="80" y="154" class="label">Stage 1</text>
  <text x="80" y="182" class="body">`basic_pendulum` 一开始是什么</text>
  <text x="80" y="206" class="body">先认 short name</text>

  <rect x="330" y="118" width="240" height="108" rx="18" class="cardB"/>
  <text x="360" y="154" class="label">Stage 2</text>
  <text x="360" y="182" class="body">launcher 把它送到哪里</text>
  <text x="360" y="206" class="body">先认 router handoff</text>

  <rect x="610" y="118" width="240" height="108" rx="18" class="cardC"/>
  <text x="640" y="154" class="label">Stage 3</text>
  <text x="640" y="182" class="body">`Example.__init__()` 怎样组装对象</text>
  <text x="640" y="206" class="body">先认 runtime stack</text>

  <rect x="890" y="118" width="240" height="108" rx="18" class="cardD"/>
  <text x="920" y="154" class="label">Stage 4</text>
  <text x="920" y="182" class="body">这些对象各自负责什么</text>
  <text x="920" y="206" class="body">先拆清边界</text>

  <rect x="1170" y="118" width="220" height="108" rx="18" class="cardE"/>
  <text x="1200" y="154" class="label">Stage 5</text>
  <text x="1200" y="182" class="body">一次 step 真正怎样跑</text>
  <text x="1200" y="206" class="body">先认 simulate loop</text>

  <path d="M 290 172 L 330 172" class="arrow"/>
  <path d="M 570 172 L 610 172" class="arrow"/>
  <path d="M 850 172 L 890 172" class="arrow"/>
  <path d="M 1130 172 L 1170 172" class="arrow"/>

  <text x="720" y="286" text-anchor="middle" class="foot">读顺序的目标不是一次吃完所有实现细节，而是让每一步都给下一步留一个稳定输出。</text>
</svg>
