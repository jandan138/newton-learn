<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 02 defer for now map</title>
  <desc id="desc">A parking-lot diagram showing which branches should be deferred during the first pass of chapter 02.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .lane { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .park { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1280" height="430" fill="#ffffff"/>
  <text x="50" y="46" class="title">Defer for now: 把支线停进停车场，先保住 first pass 的主问题</text>
  <text x="50" y="76" class="sub">这些内容以后会读，但现在不让它们抢走 chapter 02 的焦点。</text>

  <rect x="50" y="125" width="280" height="210" rx="18" class="lane"/>
  <text x="80" y="162" class="label">现在只跟 core lane</text>
  <text x="80" y="194" class="body">README -> walkthrough</text>
  <text x="80" y="220" class="body">basic_pendulum -> runtime stack</text>
  <text x="80" y="246" class="body">simulate() -> solver.step()</text>
  <text x="80" y="272" class="body">先讲顺对象分工与执行链</text>

  <rect x="390" y="110" width="360" height="78" rx="16" class="park"/>
  <text x="420" y="138" class="label">viewer / parser /</text>
  <text x="420" y="160" class="label">device plumbing</text>
  <text x="420" y="182" class="body">属于 examples 基础设施，不是 chapter 02 主线</text>

  <rect x="390" y="205" width="360" height="78" rx="16" class="park"/>
  <text x="420" y="233" class="label">capture() / render() /</text>
  <text x="420" y="255" class="label">test_final()</text>
  <text x="420" y="277" class="body">这是 graph replay / viewer / 测试支线</text>

  <rect x="390" y="300" width="360" height="78" rx="16" class="park"/>
  <text x="420" y="328" class="label">ModelBuilder.finalize()</text>
  <text x="420" y="350" class="label">internals</text>
  <text x="420" y="372" class="body">更适合和场景构建章节一起读</text>

  <rect x="790" y="158" width="360" height="78" rx="16" class="park"/>
  <text x="820" y="186" class="label">solver_xpbd.py 与</text>
  <text x="820" y="208" class="label">solver internals</text>
  <text x="820" y="230" class="body">留到 solver 章节，不在 02 展开</text>

  <rect x="790" y="253" width="360" height="78" rx="16" class="park"/>
  <text x="820" y="285" class="label">其它 examples 的横向对读</text>
  <text x="820" y="309" class="body">basic_pendulum 已足够搭起最小链</text>

  <path d="M 330 185 L 390 149" class="arrow"/>
  <path d="M 330 220 L 390 244" class="arrow"/>
  <path d="M 330 255 L 390 339" class="arrow"/>
  <path d="M 750 244 L 790 197" class="arrow"/>
  <path d="M 750 285 L 790 292" class="arrow"/>

  <text x="640" y="405" text-anchor="middle" class="foot">先把主干讲清，支线以后再精准回收。</text>
</svg>
