<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="260" viewBox="0 0 1280 260" role="img" aria-labelledby="title desc">
  <title id="title">basic pendulum checkpoints map</title>
  <desc id="desc">A lightweight checkpoint map for the three places to inspect after running basic_pendulum: Example.__init__, capture, and simulate.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 15px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>
  <rect width="1280" height="260" fill="#ffffff"/>
  <text x="44" y="42" class="title">跑完后先盯这几个位置</text>
  <text x="44" y="70" class="sub">这节的重点不是继续读更多文件，而是先把 run 后最值钱的三个观察点按顺序钉住。</text>

  <rect x="56" y="112" width="350" height="100" rx="20" class="cardA"/>
  <text x="84" y="146" class="label">1. `Example.__init__()`</text>
  <text x="84" y="172" class="body">看场景怎样被 builder 组出来</text>
  <text x="84" y="196" class="code">link / joint / ground / finalize</text>

  <rect x="464" y="112" width="350" height="100" rx="20" class="cardB"/>
  <text x="492" y="146" class="label">2. `capture()`</text>
  <text x="492" y="172" class="body">确认 graph replay 只是同一段模拟的另一种跑法</text>
  <text x="492" y="196" class="code">不是新的 CLI 分支</text>

  <rect x="872" y="112" width="350" height="100" rx="20" class="cardC"/>
  <text x="900" y="146" class="label">3. `simulate()`</text>
  <text x="900" y="172" class="body">把最小 substep 顺序背顺</text>
  <text x="900" y="196" class="code">clear -&gt; apply -&gt; collide -&gt; solve -&gt; swap</text>

  <path d="M 406 162 L 464 162" class="arrow"/>
  <path d="M 814 162 L 872 162" class="arrow"/>
</svg>
