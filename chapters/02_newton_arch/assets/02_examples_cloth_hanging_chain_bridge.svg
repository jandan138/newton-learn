<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="410" viewBox="0 0 1520 410" role="img" aria-labelledby="title desc">
  <title id="title">cloth_hanging architecture chain</title>
  <desc id="desc">A source-exact bridge showing the cloth_hanging example chain from solver-family selection through cloth building, contacts, collide, and SolverXPBD step.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 20px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 15px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #5b3b8a; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1520" height="410" fill="#ffffff"/>
  <text x="50" y="46" class="title">`cloth_hanging --solver xpbd` 把 chapter 02 的骨架接到了 cloth solver route 上</text>
  <text x="50" y="76" class="sub">这张图只保留“入口怎样换路”和“碰撞在哪一站接上”两个最关键问题。</text>

  <rect x="40" y="126" width="230" height="132" rx="18" class="cardA"/>
  <text x="70" y="162" class="label">CLI 选路</text>
  <text x="70" y="190" class="code">`cloth_hanging --solver xpbd`</text>
  <text x="70" y="214" class="body">先由参数决定 solver family</text>

  <rect x="310" y="126" width="250" height="132" rx="18" class="cardB"/>
  <text x="340" y="162" class="label">cloth scene builder</text>
  <text x="340" y="190" class="body">`add_ground_plane()`</text>
  <text x="340" y="214" class="body">`add_cloth_grid(...)`</text>

  <rect x="600" y="126" width="250" height="132" rx="18" class="cardC"/>
  <text x="630" y="162" class="label">`builder.finalize()`</text>
  <text x="630" y="190" class="body">先冻结场景，</text>
  <text x="630" y="214" class="body">再派生 runtime objects</text>

  <rect x="890" y="104" width="250" height="154" rx="18" class="cardD"/>
  <text x="920" y="140" class="label">runtime + collide</text>
  <text x="920" y="168" class="code">`state() / control() / contacts()`</text>
  <text x="920" y="192" class="body">显式过 `model.collide(...)`</text>
  <text x="920" y="216" class="body">把这一拍接触结果送进 solver</text>

  <rect x="1180" y="126" width="300" height="132" rx="18" class="cardE"/>
  <text x="1210" y="162" class="label">XPBD step</text>
  <text x="1210" y="190" class="code">`SolverXPBD(..., iterations=...).step(...)`</text>
  <text x="1210" y="214" class="body">相同场景主题下的一条 solver route</text>

  <path d="M 270 192 L 310 192" class="arrow"/>
  <path d="M 560 192 L 600 192" class="arrow"/>
  <path d="M 850 192 L 890 180" class="arrow"/>
  <path d="M 1140 180 L 1180 192" class="arrow"/>

  <text x="760" y="344" text-anchor="middle" class="foot">如果你只能记住一句话，就记“cloth_hanging 用同一 scene 主题，把 solver family 差异压成了一个很好对照的入口”。</text>
</svg>
