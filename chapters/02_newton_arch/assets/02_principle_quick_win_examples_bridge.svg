<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
  <title id="title">Quick win examples bridge</title>
  <desc id="desc">A concept bridge for three quick-win Newton examples, each emphasizing a different observation angle while reusing the same backbone.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .code { font: 700 16px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #243754; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .band { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.8; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1400" height="430" fill="#ffffff"/>
  <text x="50" y="46" class="title">快速胜利不是多跑几个 demo，而是用三条命令把同一主线走熟</text>
  <text x="50" y="76" class="sub">每个例子只强调一个最值钱的观察角度：最小 step、多 world、切 solver family。</text>

  <rect x="40" y="120" width="410" height="154" rx="18" class="cardA"/>
  <text x="70" y="156" class="label">最小主链</text>
  <text x="70" y="184" class="code">uv run -m newton.examples basic_pendulum</text>
  <text x="70" y="212" class="body">先把 example 入口、公共对象和一次 `solver.step()`</text>
  <text x="70" y="236" class="body">讲成一条顺畅的最小执行链</text>

  <rect x="495" y="120" width="410" height="154" rx="18" class="cardB"/>
  <text x="525" y="156" class="label">多 world 复制</text>
  <text x="525" y="184" class="code">uv run -m newton.examples robot_cartpole --world-count 100</text>
  <text x="525" y="212" class="body">看同一套 `Model` / solver 怎样复制到很多 world</text>
  <text x="525" y="236" class="body">把吞吐问题重新挂回同一骨架上</text>

  <rect x="950" y="120" width="410" height="154" rx="18" class="cardC"/>
  <text x="980" y="156" class="label">切 solver 家族</text>
  <text x="980" y="184" class="code">uv run -m newton.examples cloth_hanging --solver xpbd</text>
  <text x="980" y="212" class="body">看同一类场景怎样切到不同 solver route</text>
  <text x="980" y="236" class="body">把“场景不变，求解路线变”这件事看清楚</text>

  <rect x="110" y="320" width="1180" height="74" rx="18" class="band"/>
  <text x="700" y="350" text-anchor="middle" class="label">统一提问</text>
  <text x="700" y="376" text-anchor="middle" class="body">这一改动主要落在 `Model`、`State`、`Control`，还是 solver 选择？</text>

  <path d="M 245 274 L 320 320" class="arrow"/>
  <path d="M 700 274 L 700 320" class="arrow"/>
  <path d="M 1155 274 L 1080 320" class="arrow"/>

  <text x="700" y="413" text-anchor="middle" class="foot">三条命令都在复用 chapter 02 的同一 backbone，只是把注意力分别放在不同旋钮上。</text>
</svg>
