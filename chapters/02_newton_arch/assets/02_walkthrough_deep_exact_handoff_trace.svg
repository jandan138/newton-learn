<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="360" viewBox="0 0 1440 360" role="img" aria-labelledby="title desc">
  <title id="title">exact handoff trace</title>
  <desc id="desc">A source-exact trace across the five deep sections: top API and routing, constructor runtime stack assembly, model factory methods, outer and inner loop split, and the solver contract entrance.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .band { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .num { font: 700 22px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #ffffff; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="360" fill="#ffffff"/>
  <text x="48" y="44" class="title">Exact Handoff Trace: 这一节只是把 1-5 号 deep zoom 串成一条主线</text>
  <text x="48" y="74" class="sub">从 launcher 到 solver 的每一跳都在下面五个小节里各自放大；这里先把接力顺序钉住。</text>

  <rect x="60" y="110" width="1320" height="56" rx="18" class="band"/>
  <text x="90" y="144" class="code">python -m newton.examples basic_pendulum -&gt; runpy.run_module(...) -&gt; Example.__init__() -&gt; Model factories -&gt; examples.run()/simulate() -&gt; solver.step(...)</text>

  <circle cx="150" cy="244" r="24" fill="#7c99cb"/>
  <text x="150" y="252" text-anchor="middle" class="num">1</text>
  <rect x="188" y="204" width="210" height="84" rx="18" class="cardA"/>
  <text x="212" y="236" class="label">顶层 API 与 route</text>
  <text x="212" y="260" class="code">__init__ / __main__ / main()</text>

  <circle cx="456" cy="244" r="24" fill="#a287d3"/>
  <text x="456" y="252" text-anchor="middle" class="num">2</text>
  <rect x="494" y="204" width="228" height="84" rx="18" class="cardB"/>
  <text x="518" y="236" class="label">constructor 组 runtime stack</text>
  <text x="518" y="260" class="code">finalize / state / control / eval_fk</text>

  <circle cx="780" cy="244" r="24" fill="#72ac93"/>
  <text x="780" y="252" text-anchor="middle" class="num">3</text>
  <rect x="818" y="204" width="220" height="84" rx="18" class="cardC"/>
  <text x="842" y="236" class="label">Model 工厂接口</text>
  <text x="842" y="260" class="code">state / control / contacts / collide</text>

  <circle cx="1094" cy="244" r="24" fill="#d59b62"/>
  <text x="1094" y="252" text-anchor="middle" class="num">4</text>
  <rect x="1132" y="204" width="216" height="84" rx="18" class="cardD"/>
  <text x="1156" y="236" class="label">外层 loop vs 内层 chain</text>
  <text x="1156" y="260" class="code">run / step / simulate</text>

  <rect x="560" y="300" width="320" height="40" rx="16" class="cardE"/>
  <text x="720" y="326" text-anchor="middle" class="label">5. solver contract: `state_in, state_out, control, contacts, dt`</text>

  <path d="M 398 246 L 432 246" class="arrow"/>
  <path d="M 722 246 L 756 246" class="arrow"/>
  <path d="M 1038 246 L 1070 246" class="arrow"/>
  <path d="M 1238 288 L 880 314" class="arrow"/>

  <text x="720" y="356" text-anchor="middle" class="foot">chapter 02 的 deep 目标不是展开全部 internals，而是把这五个 handoff checkpoint 看成同一条连续脊柱。</text>
</svg>
