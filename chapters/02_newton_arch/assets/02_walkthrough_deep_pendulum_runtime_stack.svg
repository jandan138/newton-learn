<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="470" viewBox="0 0 1440 470" role="img" aria-labelledby="title desc">
  <title id="title">pendulum runtime stack</title>
  <desc id="desc">A source-exact constructor order map for basic_pendulum, from the __main__ branch through Example(viewer, args) to builder.finalize, solver, states, control, eval_fk, contacts, viewer.set_model, and capture.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .band { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="470" fill="#ffffff"/>
  <text x="48" y="44" class="title">2. `basic_pendulum` 怎样组装 runtime stack</text>
  <text x="48" y="74" class="sub">`__main__` 分支只负责拿到 `(viewer, args)` 并 new `Example(...)`；真正把对象一口气组出来的是 constructor。</text>

  <rect x="148" y="106" width="1144" height="54" rx="18" class="band"/>
  <text x="176" y="140" class="code">viewer, args = newton.examples.init() -&gt; example = Example(viewer, args) -&gt; newton.examples.run(example, args)</text>

  <rect x="56" y="206" width="360" height="150" rx="18" class="cardA"/>
  <text x="82" y="238" class="label">scene setup inside `Example.__init__()`</text>
  <text x="82" y="262" class="code">builder.add_link() x2</text>
  <text x="82" y="282" class="code">add_shape_box() x2</text>
  <text x="82" y="302" class="code">add_joint_revolute(j0, j1)</text>
  <text x="82" y="322" class="code">add_articulation([j0, j1])</text>
  <text x="82" y="342" class="code">add_ground_plane()</text>

  <rect x="462" y="206" width="186" height="74" rx="18" class="cardB"/>
  <text x="488" y="238" class="label">1. `self.model`</text>
  <text x="488" y="260" class="code">builder.finalize()</text>

  <rect x="694" y="206" width="192" height="74" rx="18" class="cardC"/>
  <text x="720" y="238" class="label">2. `self.solver`</text>
  <text x="720" y="260" class="code">SolverXPBD(self.model)</text>

  <rect x="932" y="194" width="198" height="86" rx="18" class="cardD"/>
  <text x="958" y="226" class="label">3. state double buffer</text>
  <text x="958" y="248" class="code">self.state_0 = model.state()</text>
  <text x="958" y="268" class="code">self.state_1 = model.state()</text>

  <rect x="1176" y="206" width="204" height="74" rx="18" class="cardA"/>
  <text x="1202" y="238" class="label">4. `self.control`</text>
  <text x="1202" y="260" class="code">self.model.control()</text>

  <path d="M 416 244 L 462 244" class="arrow"/>
  <path d="M 648 244 L 694 244" class="arrow"/>
  <path d="M 886 244 L 932 244" class="arrow"/>
  <path d="M 1130 244 L 1176 244" class="arrow"/>

  <rect x="140" y="356" width="300" height="72" rx="16" class="cardE"/>
  <text x="166" y="384" class="label">5. `eval_fk(...)`</text>
  <text x="166" y="406" class="body">joint-space 初值展开到 `state_0`</text>

  <rect x="486" y="356" width="250" height="72" rx="16" class="cardB"/>
  <text x="512" y="384" class="label">6. `self.contacts`</text>
  <text x="512" y="406" class="body">`self.model.contacts()`</text>

  <rect x="782" y="356" width="250" height="72" rx="16" class="cardC"/>
  <text x="808" y="384" class="label">7. viewer handoff</text>
  <text x="808" y="406" class="body">`self.viewer.set_model(self.model)`</text>

  <rect x="1078" y="356" width="210" height="72" rx="16" class="cardD"/>
  <text x="1104" y="384" class="label">8. graph capture</text>
  <text x="1104" y="406" class="body">`self.capture()`</text>

  <path d="M 1278 280 L 1182 356" class="arrow"/>
  <path d="M 1180 280 L 908 356" class="arrow"/>
  <path d="M 1100 280 L 612 356" class="arrow"/>
  <path d="M 1030 280 L 290 356" class="arrow"/>

  <text x="720" y="458" text-anchor="middle" class="foot">源码注释明确写着: `eval_fk(...)` 对 MuJoCo 不必需, 但对这里的其它 solver 路线是进入第一轮仿真前的 body-state 预展开。</text>
</svg>
