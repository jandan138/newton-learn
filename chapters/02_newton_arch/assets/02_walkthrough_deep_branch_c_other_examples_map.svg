<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">branch c other examples map</title>
  <desc id="desc">A teaching-compressed comparison map showing basic_pendulum as the mainline and robot_cartpole plus cloth_hanging as targeted follow-up examples.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1280" height="320" fill="#ffffff"/>
  <text x="48" y="44" class="title">Branch C: 其它 examples</text>
  <text x="48" y="74" class="sub">这张图是教学压缩导航图; 它不是让你换主例子, 而是告诉你 mainline 之外还有哪两类观察值得补。</text>

  <rect x="474" y="110" width="332" height="92" rx="20" class="cardA"/>
  <text x="504" y="146" class="label">mainline stays `basic_pendulum`</text>
  <text x="504" y="172" class="body">最小 rigid articulation + 最短 runtime stack handoff</text>

  <rect x="84" y="118" width="278" height="110" rx="18" class="cardB"/>
  <text x="112" y="152" class="label">`robot_cartpole --world-count 100`</text>
  <text x="112" y="176" class="code">add_usd() -&gt; builder.replicate(...)</text>
  <text x="112" y="196" class="code">-&gt; SolverMuJoCo(model)</text>
  <text x="112" y="216" class="body">最适合补 imported articulation + multi-world</text>

  <rect x="918" y="118" width="278" height="110" rx="18" class="cardC"/>
  <text x="946" y="152" class="label">`cloth_hanging --solver xpbd`</text>
  <text x="946" y="176" class="code">add_cloth_grid() -&gt; model.contacts()</text>
  <text x="946" y="196" class="code">-&gt; model.collide() -&gt; SolverXPBD.step(...)</text>
  <text x="946" y="216" class="body">最适合补 soft/contact-heavy 路径</text>

  <path d="M 474 156 L 362 170" class="arrow"/>
  <path d="M 806 156 L 918 170" class="arrow"/>

  <text x="640" y="306" text-anchor="middle" class="foot">如果你只是想把 chapter 02 的 architecture spine 讲顺, `basic_pendulum` 已经够了; 其它 examples 是按问题补观察, 不是替代主链。</text>
</svg>
