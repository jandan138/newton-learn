<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">optional branches map</title>
  <desc id="desc">A teaching-compressed navigation map showing the three optional deep branches: examples.init viewer and device setup, ModelBuilder.finalize freeze details, and other examples for comparison.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .hub { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1280" height="300" fill="#ffffff"/>
  <text x="48" y="44" class="title">Optional Branches: mainline 守住后, 再按问题去分叉</text>
  <text x="48" y="74" class="sub">这张图是教学压缩导航图, 不新增源码语义; 它只告诉你 A/B/C 各自补的是哪一块观察。</text>

  <rect x="430" y="116" width="420" height="84" rx="20" class="hub"/>
  <text x="460" y="150" class="label">chapter 02 mainline already covered</text>
  <text x="460" y="176" class="body">launcher -&gt; `Example.__init__()` -&gt; runtime objects -&gt; `simulate()` -&gt; `solver.step()`</text>

  <rect x="84" y="104" width="250" height="100" rx="18" class="cardA"/>
  <text x="112" y="140" class="label">Branch A</text>
  <text x="112" y="166" class="body">`examples.init()`</text>
  <text x="112" y="188" class="body">viewer/device 选择怎样发生</text>

  <rect x="508" y="214" width="264" height="66" rx="18" class="cardB"/>
  <text x="536" y="242" class="label">Branch B</text>
  <text x="536" y="264" class="body">`ModelBuilder.finalize()` freeze checkpoints</text>

  <rect x="946" y="104" width="250" height="100" rx="18" class="cardC"/>
  <text x="974" y="140" class="label">Branch C</text>
  <text x="974" y="166" class="body">其它 examples</text>
  <text x="974" y="188" class="body">用来补多 world 或 contacts 观察</text>

  <path d="M 430 158 L 334 154" class="arrow"/>
  <path d="M 640 200 L 640 214" class="arrow"/>
  <path d="M 850 158 L 946 154" class="arrow"/>

  <text x="640" y="294" text-anchor="middle" class="foot">如果你现在的问题不在 architecture handoff 主线里, 再挑对应分支下潜; 否则先别让这些旁路打断第一遍主链记忆。</text>
</svg>
