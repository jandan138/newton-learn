<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="340" viewBox="0 0 1440 340" role="img" aria-labelledby="title desc">
  <title id="title">main walkthrough stage overview</title>
  <desc id="desc">A teaching-compressed stage overview showing the five-stage handoff of the main chapter 02 walkthrough.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="340" fill="#ffffff"/>
  <text x="50" y="46" class="title">Main Walkthrough: 五段 handoff 把一条主链讲顺</text>
  <text x="50" y="76" class="sub">这是总览压缩图，后面的 Stage 1-5 会分别把每一段拆开核对源码。</text>

  <rect x="50" y="126" width="220" height="104" rx="18" class="cardA"/>
  <text x="80" y="162" class="label">1. short name</text>
  <text x="80" y="190" class="body">CLI 里先选例子</text>

  <rect x="320" y="126" width="220" height="104" rx="18" class="cardB"/>
  <text x="350" y="162" class="label">2. target module</text>
  <text x="350" y="190" class="body">launcher 把执行权交出去</text>

  <rect x="590" y="126" width="250" height="104" rx="18" class="cardC"/>
  <text x="620" y="162" class="label">3. runtime stack</text>
  <text x="620" y="190" class="body">`Example.__init__()` 组出对象</text>

  <rect x="890" y="126" width="220" height="104" rx="18" class="cardD"/>
  <text x="920" y="162" class="label">4. object roles</text>
  <text x="920" y="190" class="body">拆清分工和边界</text>

  <rect x="1160" y="126" width="230" height="104" rx="18" class="cardE"/>
  <text x="1190" y="162" class="label">5. simulate loop</text>
  <text x="1190" y="190" class="body">把对象接成一轮仿真</text>

  <path d="M 270 178 L 320 178" class="arrow"/>
  <path d="M 540 178 L 590 178" class="arrow"/>
  <path d="M 840 178 L 890 178" class="arrow"/>
  <path d="M 1110 178 L 1160 178" class="arrow"/>

  <text x="720" y="292" text-anchor="middle" class="foot">每一 stage 只新增一层必要语义，所以第一遍不会把 short name、module、Example、solver 全部压成同一个词。</text>
</svg>
