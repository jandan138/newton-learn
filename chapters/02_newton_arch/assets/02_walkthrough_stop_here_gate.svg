<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">stop here gate</title>
  <desc id="desc">A lightweight completion gate for the beginner walkthrough, listing the five ideas the reader should be able to explain before going deeper.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .chipA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.3; }
    .chipB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.3; }
    .chipC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.3; }
    .chipD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.3; }
    .chipE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.3; }
  </style>

  <rect width="1280" height="320" fill="#ffffff"/>
  <text x="50" y="46" class="title">Stop Here: 能把这五件事讲顺，就够带着稳定主线进入下一章</text>
  <text x="50" y="76" class="sub">这是学习完成门槛，不是新的源码路径。</text>

  <rect x="50" y="122" width="220" height="70" rx="18" class="chipA"/>
  <text x="80" y="152" class="label">1. short name 只是路由 key</text>
  <text x="80" y="174" class="body">不是已经在跑的 `Example`</text>

  <rect x="290" y="122" width="220" height="70" rx="18" class="chipB"/>
  <text x="320" y="152" class="label">2. launcher 只做 handoff</text>
  <text x="320" y="174" class="body">不是总 orchestrator</text>

  <rect x="530" y="122" width="220" height="70" rx="18" class="chipC"/>
  <text x="560" y="152" class="label">3. `Example.__init__()` 组对象</text>
  <text x="560" y="174" class="body">runtime stack 在这里第一次成形</text>

  <rect x="770" y="122" width="220" height="70" rx="18" class="chipD"/>
  <text x="800" y="152" class="label">4. `eval_fk(...)` 补初始 body state</text>
  <text x="800" y="174" class="body">solver 前先展开 joint-space</text>

  <rect x="1010" y="122" width="220" height="70" rx="18" class="chipE"/>
  <text x="1040" y="152" class="label">5. step layering 要拆开</text>
  <text x="1040" y="174" class="body">`run()` / `step()` / `simulate()` / solver</text>

  <text x="640" y="274" text-anchor="middle" class="foot">如果这五句你都能不用回头看表格就讲出来，chapter 02 的 beginner walkthrough 已经完成任务了。</text>
</svg>
