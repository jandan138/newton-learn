<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 02 source note scope map</title>
  <desc id="desc">A lightweight map separating the learning repo, the upstream Newton checkout, and online version matching.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 22px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1200" height="340" fill="#ffffff"/>
  <text x="50" y="46" class="title">Chapter 02 reading boundary: 文档仓负责解释，上游仓负责源码</text>
  <text x="50" y="76" class="sub">README 只提醒你去哪里看，不在这里复制 Newton 本体实现。</text>

  <rect x="50" y="110" width="320" height="150" rx="18" class="cardA"/>
  <text x="80" y="145" class="label">newton-learn 学习仓</text>
  <text x="80" y="178" class="body">chapters/02_newton_arch/*</text>
  <text x="80" y="204" class="body">负责：边界、导航、教学解释</text>
  <text x="80" y="230" class="body">不替代上游源码阅读</text>

  <rect x="430" y="110" width="380" height="150" rx="18" class="cardB"/>
  <text x="460" y="145" class="label">并列的上游 newton checkout</text>
  <text x="460" y="178" class="body">newton/examples/... 与 newton/_src/...</text>
  <text x="460" y="204" class="body">负责：真实 symbol、实现细节、执行链</text>
  <text x="460" y="230" class="body">本章提到的路径默认都指向这里</text>

  <rect x="870" y="110" width="280" height="150" rx="18" class="cardC"/>
  <text x="900" y="145" class="label">线上对照</text>
  <text x="900" y="178" class="body">用 source_paths 找文件</text>
  <text x="900" y="204" class="body">用 newton_commit 对齐版本</text>
  <text x="900" y="230" class="body">避免拿错源码快照</text>

  <path d="M 370 185 L 430 185" class="arrow"/>
  <path d="M 960 260 L 780 260 L 780 210" class="arrow"/>

  <text x="600" y="308" text-anchor="middle" class="foot">先认清阅读边界，再去正确的位置核对代码和版本。</text>
</svg>
