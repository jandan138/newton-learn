<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="380" viewBox="0 0 1320 380" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 02 core pass bridge</title>
  <desc id="desc">A focused reading bridge showing the exact first-pass chain from thin entry to solver contract.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 19px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1320" height="380" fill="#ffffff"/>
  <text x="50" y="46" class="title">Core pass: 只跟一条薄主线，不把 chapter 02 扩成全架构通读</text>
  <text x="50" y="76" class="sub">从 launcher 到 solver contract，每个锚点都只抓最需要的函数或对象。</text>

  <rect x="40" y="120" width="190" height="145" rx="18" class="cardA"/>
  <text x="65" y="154" class="label">examples/</text>
  <text x="65" y="178" class="label">__main__.py</text>
  <text x="65" y="206" class="body">确认 CLI 入口很薄</text>
  <text x="65" y="230" class="body">只做转发</text>

  <rect x="250" y="120" width="190" height="145" rx="18" class="cardA"/>
  <text x="275" y="154" class="label">examples/</text>
  <text x="275" y="178" class="label">__init__.py</text>
  <text x="275" y="206" class="body">只看 get_examples()</text>
  <text x="275" y="230" class="body">main() / run()</text>

  <rect x="460" y="120" width="210" height="145" rx="18" class="cardB"/>
  <text x="485" y="154" class="label">basic_pendulum</text>
  <text x="485" y="178" class="label">example module</text>
  <text x="485" y="206" class="body">盯 Example.__init__()</text>
  <text x="485" y="230" class="body">simulate() / step()</text>

  <rect x="690" y="120" width="180" height="145" rx="18" class="cardC"/>
  <text x="715" y="154" class="label">newton/</text>
  <text x="715" y="178" class="label">__init__.py</text>
  <text x="715" y="206" class="body">只看 public exports</text>
  <text x="715" y="230" class="body">识别核心对象名</text>

  <rect x="890" y="120" width="190" height="145" rx="18" class="cardD"/>
  <text x="915" y="154" class="label">sim/model.py</text>
  <text x="915" y="182" class="body">state() / control()</text>
  <text x="915" y="206" class="body">contacts() / collide()</text>

  <rect x="1100" y="120" width="180" height="145" rx="18" class="cardC"/>
  <text x="1125" y="154" class="label">solvers/</text>
  <text x="1125" y="178" class="label">solver.py</text>
  <text x="1125" y="206" class="body">统一 step contract</text>
  <text x="1125" y="230" class="body">读输入与输出关系</text>

  <path d="M 230 192 L 250 192" class="arrow"/>
  <path d="M 440 192 L 460 192" class="arrow"/>
  <path d="M 670 192 L 690 192" class="arrow"/>
  <path d="M 870 192 L 890 192" class="arrow"/>
  <path d="M 1080 192 L 1100 192" class="arrow"/>

  <text x="660" y="332" text-anchor="middle" class="foot">薄入口 - 真实组装点 - public API - runtime objects - solver contract。</text>
</svg>
