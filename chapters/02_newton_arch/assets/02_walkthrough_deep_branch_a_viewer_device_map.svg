<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="320" viewBox="0 0 1360 320" role="img" aria-labelledby="title desc">
  <title id="title">branch a viewer and device map</title>
  <desc id="desc">A source-exact map of examples.init showing argument parsing, warp config, quiet and device setup, benchmark forcing null viewer, viewer selection, and returning viewer plus args.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1360" height="320" fill="#ffffff"/>
  <text x="44" y="44" class="title">Branch A: `examples.init()` 的 viewer/device 选择</text>
  <text x="44" y="74" class="sub">这个分支的核心是: parse args -&gt; 应用 Warp 相关设置 -&gt; 选择 viewer 构造函数 -&gt; return `(viewer, args)`。</text>

  <rect x="54" y="120" width="228" height="90" rx="18" class="cardA"/>
  <text x="78" y="154" class="label">1. parse args</text>
  <text x="78" y="178" class="code">parser.parse_known_args()</text>
  <text x="78" y="198" class="code">or parser.parse_args()</text>

  <rect x="324" y="108" width="264" height="114" rx="18" class="cardB"/>
  <text x="348" y="142" class="label">2. Warp-side setup</text>
  <text x="348" y="166" class="code">_apply_warp_config(parser, args)</text>
  <text x="348" y="186" class="code">if args.quiet: wp.config.quiet = True</text>
  <text x="348" y="206" class="code">if args.device: wp.set_device(args.device)</text>

  <rect x="630" y="120" width="274" height="90" rx="18" class="cardC"/>
  <text x="654" y="154" class="label">3. benchmark special case</text>
  <text x="654" y="178" class="code">if args.benchmark is not False:</text>
  <text x="654" y="198" class="code">args.viewer = "null"; _raise_benchmark_priority(...)</text>

  <rect x="946" y="108" width="280" height="114" rx="18" class="cardD"/>
  <text x="970" y="142" class="label">4. choose concrete viewer</text>
  <text x="970" y="166" class="code">"gl" / "usd" / "rerun" / "null" / "viser"</text>
  <text x="970" y="186" class="body">每个分支各自构造 `ViewerGL/ViewerUSD/...`</text>
  <text x="970" y="206" class="code">return viewer, args</text>

  <path d="M 282 166 L 324 166" class="arrow"/>
  <path d="M 588 166 L 630 166" class="arrow"/>
  <path d="M 904 166 L 946 166" class="arrow"/>

  <text x="680" y="298" text-anchor="middle" class="foot">所以 `init()` 并不负责 scene 组装; 它只把 parser、device、viewer 这层准备好, 然后把 `viewer` 和 `args` 交给具体 example constructor。</text>
</svg>
