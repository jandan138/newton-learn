<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="290" viewBox="0 0 1280 290" role="img" aria-labelledby="title desc">
  <title id="title">basic pendulum knobs map</title>
  <desc id="desc">A lightweight map grouping the four main observation knobs in basic_pendulum by what they change: geometry, anchor height, time-stepping, and swing axis.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 15px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
  </style>
  <rect width="1280" height="290" fill="#ffffff"/>
  <text x="44" y="42" class="title">改这里会怎样</text>
  <text x="44" y="70" class="sub">先把四种改动分层：几何尺寸、锚点高度、时间推进粗细、真实摆动轴向。然后再回头看表格细节。</text>

  <rect x="56" y="112" width="260" height="118" rx="20" class="cardA"/>
  <text x="84" y="146" class="label">1. `hx / hy / hz`</text>
  <text x="84" y="172" class="body">改几何尺寸与惯量</text>
  <text x="84" y="198" class="code">更像在动 `Model`</text>

  <rect x="360" y="112" width="260" height="118" rx="20" class="cardB"/>
  <text x="388" y="146" class="label">2. `parent_xform.p`</text>
  <text x="388" y="172" class="body">改世界锚点高度</text>
  <text x="388" y="198" class="code">更早或更晚接地</text>

  <rect x="664" y="112" width="260" height="118" rx="20" class="cardC"/>
  <text x="692" y="146" class="label">3. `sim_substeps`</text>
  <text x="692" y="172" class="body">改一帧内部时间推进粒度</text>
  <text x="692" y="198" class="code">更像在动 solver 设置</text>

  <rect x="968" y="112" width="260" height="118" rx="20" class="cardD"/>
  <text x="996" y="146" class="label">4. `axis`</text>
  <text x="996" y="172" class="body">改真实转轴方向</text>
  <text x="996" y="198" class="code">摆动平面会变</text>

  <text x="640" y="266" text-anchor="middle" class="body">`rot` 的图区分仍然保留在后面那张对比图里，因为它是在解释第 4 类改动最容易看错的地方。</text>
</svg>
