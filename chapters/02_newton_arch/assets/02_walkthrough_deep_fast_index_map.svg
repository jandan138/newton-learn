<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="340" viewBox="0 0 1360 340" role="img" aria-labelledby="title desc">
  <title id="title">fast deep index map</title>
  <desc id="desc">A source-exact map grouping D1 to D7 from the deep index into public exports, launcher, example assembly, model factory, state fields, solver contract, and builder finalize.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1360" height="340" fill="#ffffff"/>
  <text x="44" y="44" class="title">Fast Deep Index: D1-D7 其实是在帮你记 7 个固定入口</text>
  <text x="44" y="74" class="sub">图里每张卡都直接对应上面表格的一行；查精确行号时仍然回到表格本身。</text>

  <rect x="44" y="108" width="264" height="84" rx="18" class="cardA"/>
  <text x="68" y="140" class="label">D1 public exports</text>
  <text x="68" y="164" class="code">newton/__init__.py</text>
  <text x="68" y="184" class="code">newton/_src/sim/__init__.py</text>

  <rect x="334" y="108" width="264" height="84" rx="18" class="cardB"/>
  <text x="358" y="140" class="label">D2 launcher + outer loop</text>
  <text x="358" y="164" class="code">examples/__main__.py</text>
  <text x="358" y="184" class="code">main / get_examples / run / init</text>

  <rect x="624" y="108" width="264" height="84" rx="18" class="cardC"/>
  <text x="648" y="140" class="label">D3 concrete example</text>
  <text x="648" y="164" class="code">example_basic_pendulum.py</text>
  <text x="648" y="184" class="code">Example.__init__ / simulate / step</text>

  <rect x="914" y="108" width="194" height="84" rx="18" class="cardD"/>
  <text x="938" y="140" class="label">D4 model factory</text>
  <text x="938" y="164" class="code">model.py</text>
  <text x="938" y="184" class="code">state / control / contacts / collide</text>

  <rect x="1134" y="108" width="182" height="84" rx="18" class="cardE"/>
  <text x="1158" y="140" class="label">D5 state fields</text>
  <text x="1158" y="164" class="code">state.py</text>
  <text x="1158" y="184" class="code">State</text>

  <rect x="380" y="226" width="284" height="84" rx="18" class="cardA"/>
  <text x="404" y="258" class="label">D6 solver contract</text>
  <text x="404" y="282" class="code">solver.py</text>
  <text x="404" y="302" class="code">SolverBase.step / integrate_* helpers</text>

  <rect x="698" y="226" width="284" height="84" rx="18" class="cardB"/>
  <text x="722" y="258" class="label">D7 builder freeze point</text>
  <text x="722" y="282" class="code">builder.py</text>
  <text x="722" y="302" class="code">ModelBuilder.finalize</text>

  <path d="M 598 150 L 624 150" class="arrow"/>
  <path d="M 888 150 L 914 150" class="arrow"/>
  <path d="M 756 192 L 522 226" class="arrow"/>
  <path d="M 790 192 L 840 226" class="arrow"/>

  <text x="680" y="330" text-anchor="middle" class="foot">第一次 deep read 时，最稳的顺序通常是 D2 -&gt; D3 -&gt; D4/D6；D1 与 D5 是查名词，D7 是 builder 冻结分支。</text>
</svg>
