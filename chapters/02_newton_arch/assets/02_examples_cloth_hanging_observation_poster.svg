<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">cloth_hanging observation poster</title>
  <desc id="desc">A poster summarizing the main observation angles for cloth_hanging: solver family switching, same backbone on the soft path, and separating cloth-builder knobs from solver knobs.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .cardA { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
  </style>

  <rect width="1400" height="360" fill="#ffffff"/>
  <text x="50" y="46" class="title">`cloth_hanging` 最适合拿来补这三种观察</text>
  <text x="50" y="76" class="sub">它不是让你现在吃透所有 cloth solver，而是让你先对“solver family 切换”这件事长出稳定直觉。</text>

  <rect x="50" y="120" width="400" height="172" rx="18" class="cardA"/>
  <text x="82" y="158" class="label">同场景切 solver family</text>
  <text x="82" y="188" class="body">比起硬背 8 个 solver 名字，</text>
  <text x="82" y="212" class="body">先看同一类布料场景怎样切路更容易形成地图感。</text>

  <rect x="500" y="120" width="400" height="172" rx="18" class="cardB"/>
  <text x="532" y="158" class="label">soft / cloth 也保留同一主链</text>
  <text x="532" y="188" class="body">建场景、拿 runtime objects、碰撞、solver step</text>
  <text x="532" y="212" class="body">这条骨架并没有因为换成布料就消失。</text>

  <rect x="950" y="120" width="400" height="172" rx="18" class="cardC"/>
  <text x="982" y="158" class="label">builder 参数和 solver 参数分层</text>
  <text x="982" y="188" class="body">`width / height` 这类量在改场景规模，</text>
  <text x="982" y="212" class="body">`spring_ke` 或 solver family 才是在改求解路线和刚度策略。</text>
</svg>
