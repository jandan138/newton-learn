<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="400" viewBox="0 0 1360 400" role="img" aria-labelledby="title desc">
  <title id="title">From chapters 00 and 01 into Newton proper</title>
  <desc id="desc">A bridge diagram showing prerequisite terms and Warp execution basics feeding into chapter 02's Newton architecture layer.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 22px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.8; }
    .cardD { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1360" height="400" fill="#ffffff"/>
  <text x="50" y="46" class="title">00 / 01 先铺地基，02 才开始回答 Newton 自己怎样组织起来</text>
  <text x="50" y="76" class="sub">从词汇和执行模型，过渡到 examples、public API、四层主干与 Contacts handoff 的组织问题。</text>

  <rect x="60" y="115" width="300" height="98" rx="18" class="cardA"/>
  <text x="90" y="149" class="label">00_prerequisites</text>
  <text x="90" y="176" class="body">articulation、M、J 这些词先不再陌生</text>
  <text x="90" y="199" class="body">先回答“这些名词在说什么”</text>

  <rect x="60" y="242" width="300" height="98" rx="18" class="cardB"/>
  <text x="90" y="276" class="label">01_warp_basics</text>
  <text x="90" y="303" class="body">kernel、wp.launch、wp.tid()、wp.array</text>
  <text x="90" y="326" class="body">先回答“批量执行模型怎样工作”</text>

  <rect x="450" y="133" width="410" height="188" rx="20" class="cardC"/>
  <text x="480" y="171" class="label">02 Newton 总体架构</text>
  <text x="480" y="199" class="body">把 examples 入口、公共 API、Model / State / Control / Solver</text>
  <text x="480" y="223" class="body">和 Contacts 结果 handoff 组织成最小执行链</text>
  <text x="480" y="247" class="body">重点从“词义”切换成“这些对象怎样接力跑起来”</text>
  <text x="480" y="271" class="body">目标：先看清 Newton 本体的组织层，而不是钻单个 solver</text>

  <rect x="950" y="146" width="320" height="162" rx="18" class="cardD"/>
  <text x="980" y="180" class="label">这一章的问题换了</text>
  <text x="980" y="208" class="body">不再问“词是什么意思”</text>
  <text x="980" y="232" class="body">也不再只问“kernel 怎样批量执行”</text>
  <text x="980" y="256" class="body">而是问“Newton 怎样把这些东西</text>
  <text x="980" y="280" class="body">组织成一个能跑的架构”</text>

  <path d="M 360 164 L 450 191" class="arrow"/>
  <path d="M 360 291 L 450 257" class="arrow"/>
  <path d="M 860 227 L 950 227" class="arrow"/>

  <text x="680" y="373" text-anchor="middle" class="foot">00 / 01 先把名词和执行直觉补齐，02 才开始把这些东西收成 Newton 的对象与 runtime 组织。</text>
</svg>
