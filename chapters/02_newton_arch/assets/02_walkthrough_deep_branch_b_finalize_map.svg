<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="350" viewBox="0 0 1440 350" role="img" aria-labelledby="title desc">
  <title id="title">branch b finalize map</title>
  <desc id="desc">A source-exact checkpoint map through ModelBuilder.finalize: validation gates, world starts, Model allocation, array freezing for particles and shapes, body and joint transfer, world starts and counts, contact-pair discovery, gravity, actuators, and custom attributes.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="350" fill="#ffffff"/>
  <text x="44" y="44" class="title">Branch B: `ModelBuilder.finalize()` 的内部冻结切面</text>
  <text x="44" y="74" class="sub">这张图只标出源码里真正出现的几个 freeze checkpoints; 它是 source-exact 的切面图, 不是穷尽所有数组赋值的总表。</text>

  <rect x="44" y="120" width="214" height="90" rx="18" class="cardA"/>
  <text x="68" y="154" class="label">1. validation gates</text>
  <text x="68" y="178" class="code">_validate_world_ordering()</text>
  <text x="68" y="198" class="code">_validate_joints() / _validate_shapes()</text>

  <rect x="292" y="120" width="190" height="90" rx="18" class="cardB"/>
  <text x="316" y="154" class="label">2. world starts</text>
  <text x="316" y="178" class="code">_build_world_starts()</text>
  <text x="316" y="198" class="body">close sentinel arrays</text>

  <rect x="516" y="120" width="212" height="90" rx="18" class="cardC"/>
  <text x="540" y="154" class="label">3. allocate `Model`</text>
  <text x="540" y="178" class="code">m = Model(device)</text>
  <text x="540" y="198" class="code">request_contact/state_attributes(...)</text>

  <rect x="762" y="108" width="292" height="114" rx="18" class="cardD"/>
  <text x="786" y="142" class="label">4. freeze particles + shapes</text>
  <text x="786" y="166" class="code">wp.array(...) for particle and shape buffers</text>
  <text x="786" y="186" class="code">geo.finalize(...), local AABBs, SDF/heightfield data</text>
  <text x="786" y="206" class="code">shape_collision_group / shape_world</text>

  <rect x="1088" y="108" width="308" height="114" rx="18" class="cardE"/>
  <text x="1112" y="142" class="label">5. freeze bodies + joints</text>
  <text x="1112" y="166" class="code">body_q/body_qd/body_mass/body_world</text>
  <text x="1112" y="186" class="code">joint_q/joint_qd/joint_axis/joint_world</text>
  <text x="1112" y="206" class="code">world_start arrays + counts</text>

  <path d="M 258 166 L 292 166" class="arrow"/>
  <path d="M 482 166 L 516 166" class="arrow"/>
  <path d="M 728 166 L 762 166" class="arrow"/>
  <path d="M 1054 166 L 1088 166" class="arrow"/>

  <rect x="418" y="256" width="604" height="56" rx="18" class="cardA"/>
  <text x="446" y="288" class="code">6. `self.find_shape_contact_pairs(m)` -&gt; 7. set gravity / actuators / custom attrs -&gt; `return m`</text>

  <path d="M 1242 222 L 1022 256" class="arrow"/>

  <text x="720" y="340" text-anchor="middle" class="foot">chapter 02 第一遍只需要记住: `finalize()` 不是一个抽象黑箱名词, 而是把 builder 的 Python-side lists 真正冻结成 `Model` 上各类 device arrays 的入口。</text>
</svg>
