<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="460" viewBox="0 0 1440 460" role="img" aria-labelledby="title desc">
  <title id="title">stage 3 runtime stack bridge</title>
  <desc id="desc">A source-exact bridge showing public API names and the basic_pendulum Example.__init__ constructor assembling Model, Solver, State buffers, Control, eval_fk, and Contacts.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .band { fill: #f8fafc; stroke: #8ca0bf; stroke-width: 2.5; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.0; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="460" fill="#ffffff"/>
  <text x="50" y="46" class="title">Stage 3: concrete `Example` 第一次把 runtime stack 组出来</text>
  <text x="50" y="76" class="sub">`newton.__init__.py` 先告诉你哪些公共名字值得先认；真正把对象接到一起的是 `example_basic_pendulum.py:Example.__init__()`。</text>

  <rect x="110" y="108" width="1220" height="66" rx="18" class="band"/>
  <text x="140" y="148" class="label">public surface from `newton.__init__.py`</text>
  <text x="540" y="148" class="code">ModelBuilder, Model, State, Control, Contacts, eval_fk, solvers</text>

  <rect x="430" y="204" width="580" height="96" rx="22" class="cardE"/>
  <text x="460" y="242" class="label">`Example.__init__()`</text>
  <text x="460" y="270" class="body">`builder.add_link()` / `add_shape_box()` / `add_joint_revolute()` / `add_articulation()` / `add_ground_plane()`</text>

  <path d="M 720 174 L 720 204" class="arrow"/>

  <rect x="50" y="340" width="190" height="84" rx="18" class="cardA"/>
  <text x="80" y="374" class="label">`self.model`</text>
  <text x="80" y="398" class="code">builder.finalize()</text>

  <rect x="280" y="340" width="220" height="84" rx="18" class="cardB"/>
  <text x="310" y="374" class="label">`self.solver`</text>
  <text x="310" y="398" class="code">SolverXPBD(self.model)</text>

  <rect x="540" y="328" width="220" height="96" rx="18" class="cardC"/>
  <text x="570" y="362" class="label">`self.state_0`, `self.state_1`</text>
  <text x="570" y="386" class="code">self.model.state()</text>
  <text x="570" y="408" class="body">双缓冲 current / next</text>

  <rect x="800" y="340" width="180" height="84" rx="18" class="cardD"/>
  <text x="830" y="374" class="label">`self.control`</text>
  <text x="830" y="398" class="code">self.model.control()</text>

  <rect x="1020" y="328" width="180" height="96" rx="18" class="cardA"/>
  <text x="1050" y="362" class="label">`eval_fk(...)`</text>
  <text x="1050" y="386" class="body">joint-space -&gt; body-space</text>
  <text x="1050" y="408" class="body">write into `state_0`</text>

  <rect x="1240" y="340" width="150" height="84" rx="18" class="cardB"/>
  <text x="1270" y="374" class="label">`self.contacts`</text>
  <text x="1270" y="398" class="code">self.model.contacts()</text>

  <path d="M 500 300 L 145 340" class="arrow"/>
  <path d="M 585 300 L 390 340" class="arrow"/>
  <path d="M 690 300 L 650 328" class="arrow"/>
  <path d="M 790 300 L 890 340" class="arrow"/>
  <path d="M 880 300 L 1110 328" class="arrow"/>
  <path d="M 960 300 L 1315 340" class="arrow"/>

  <text x="720" y="450" text-anchor="middle" class="foot">chapter 02 要找的第一次大组装，不在 CLI 顶层，而在具体 example 的 constructor 里。</text>
</svg>
