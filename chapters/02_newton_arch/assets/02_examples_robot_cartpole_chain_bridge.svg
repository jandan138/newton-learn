<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="400" viewBox="0 0 1500 400" role="img" aria-labelledby="title desc">
  <title id="title">robot_cartpole architecture chain</title>
  <desc id="desc">A source-exact bridge showing the robot_cartpole example flow through USD import, world replication, finalize, and SolverMuJoCo step without a collide call.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 20px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 15px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardB { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardC { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardD { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1500" height="400" fill="#ffffff"/>
  <text x="50" y="46" class="title">`robot_cartpole` 把 chapter 02 主链扩到 USD + 多 world + MuJoCo</text>
  <text x="50" y="76" class="sub">读图时，重点是“哪几站新增了”，不是把它看成一份完整 solver 教程。</text>

  <rect x="40" y="126" width="220" height="128" rx="18" class="cardA"/>
  <text x="70" y="162" class="label">CLI 入口</text>
  <text x="70" y="190" class="code">`robot_cartpole --world-count 100`</text>
  <text x="70" y="214" class="body">先明确这次观察自带批量复制参数</text>

  <rect x="300" y="126" width="240" height="128" rx="18" class="cardB"/>
  <text x="330" y="162" class="label">`add_usd(...)`</text>
  <text x="330" y="190" class="body">单个 cartpole 模板先从 USD 导入</text>
  <text x="330" y="214" class="body">不是手工一根根加 link</text>

  <rect x="580" y="126" width="260" height="128" rx="18" class="cardC"/>
  <text x="610" y="162" class="label">`builder.replicate(...)`</text>
  <text x="610" y="190" class="code">`world_count=100`</text>
  <text x="610" y="214" class="body">把同一模板复制到很多 world</text>

  <rect x="880" y="126" width="210" height="128" rx="18" class="cardD"/>
  <text x="910" y="162" class="label">`builder.finalize()`</text>
  <text x="910" y="190" class="body">冻结成最终 `Model`</text>
  <text x="910" y="214" class="body">保留批量 world 组织</text>

  <rect x="1130" y="104" width="320" height="150" rx="18" class="cardE"/>
  <text x="1160" y="140" class="label">MuJoCo solver route</text>
  <text x="1160" y="168" class="code">`SolverMuJoCo(self.model)`</text>
  <text x="1160" y="192" class="body">`solver.step(...)` 直接推进</text>
  <text x="1160" y="216" class="body">这里显式观察点是“没有 `model.collide(...)`”</text>

  <path d="M 260 190 L 300 190" class="arrow"/>
  <path d="M 540 190 L 580 190" class="arrow"/>
  <path d="M 840 190 L 880 190" class="arrow"/>
  <path d="M 1090 190 L 1130 178" class="arrow"/>

  <text x="750" y="334" text-anchor="middle" class="foot">这条链最值得留意的新增词只有三个：`USD`、`replicate`、`MuJoCo without collide`。</text>
</svg>
