<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="380" viewBox="0 0 1460 380" role="img" aria-labelledby="title desc">
  <title id="title">robot_cartpole scope bridge</title>
  <desc id="desc">A scope bridge for robot_cartpole with many worlds, showing USD import, replication, and the MuJoCo route without an explicit collide step.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 16px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #214d3e; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardB { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardC { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardD { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1460" height="380" fill="#ffffff"/>
  <text x="50" y="46" class="title">`robot_cartpole --world-count 100` 主要帮你切换到“模板复制很多 world”的视角</text>
  <text x="50" y="76" class="sub">同一类观察仍然挂在 chapter 02 主链上，只是场景来源换成 USD，solver 路线换成 MuJoCo，而且这里没有显式 `model.collide(...)`。</text>

  <rect x="50" y="126" width="300" height="144" rx="18" class="cardA"/>
  <text x="80" y="162" class="label">先搭一个 cartpole 模板</text>
  <text x="80" y="190" class="code">`add_usd(...)`</text>
  <text x="80" y="214" class="body">先把单个 world 的场景来源看清</text>
  <text x="80" y="238" class="body">这一步是在补 `basic_pendulum` 没有的 USD 入口</text>

  <rect x="400" y="126" width="300" height="144" rx="18" class="cardB"/>
  <text x="430" y="162" class="label">再批量复制</text>
  <text x="430" y="190" class="code">`builder.replicate(..., world_count=100)`</text>
  <text x="430" y="214" class="body">重点不是更大场景，而是同一模板的多 world 复制</text>

  <rect x="750" y="126" width="300" height="144" rx="18" class="cardC"/>
  <text x="780" y="162" class="label">然后走 MuJoCo 路线</text>
  <text x="780" y="190" class="code">`SolverMuJoCo(self.model)`</text>
  <text x="780" y="214" class="body">这条链仍然是 chapter 02 backbone 的一部分</text>

  <rect x="1100" y="126" width="310" height="144" rx="18" class="cardD"/>
  <text x="1130" y="162" class="label">特别注意的缺席项</text>
  <text x="1130" y="190" class="body">这里没有 `model.collide(...)`，</text>
  <text x="1130" y="214" class="body">因此也能顺手建立 `contacts = None` 的观察直觉</text>

  <path d="M 350 198 L 400 198" class="arrow"/>
  <path d="M 700 198 L 750 198" class="arrow"/>
  <path d="M 1050 198 L 1100 198" class="arrow"/>

  <text x="730" y="334" text-anchor="middle" class="foot">这条例子的价值是把“同一模型模板复制很多次”与“单个 world 内部动力学”强行分开来看。</text>
</svg>
