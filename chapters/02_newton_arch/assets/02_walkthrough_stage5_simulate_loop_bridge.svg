<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="460" viewBox="0 0 1440 460" role="img" aria-labelledby="title desc">
  <title id="title">stage 5 simulate loop bridge</title>
  <desc id="desc">A source-exact bridge showing examples.run, Example.step, and the simulate loop chain clear_forces to solver.step and state swap.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.0; fill: none; marker-end: url(#arrow); }
    .band { fill: #f8fafc; stroke: #8ca0bf; stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="460" fill="#ffffff"/>
  <text x="50" y="46" class="title">Stage 5: `simulate()` 才真正把对象接成一轮仿真</text>
  <text x="50" y="76" class="sub">先分清三层 `step`：outer `examples.run()` 调度，`Example.step()` 包装，`Solver.step()` 推进；`simulate()` 是中间真正展开 substep 的内层链。</text>

  <rect x="70" y="120" width="220" height="92" rx="18" class="cardA"/>
  <text x="100" y="156" class="label">`examples.run()`</text>
  <text x="100" y="184" class="body">while viewer.is_running()</text>

  <rect x="350" y="120" width="230" height="92" rx="18" class="cardB"/>
  <text x="380" y="156" class="label">`Example.step()`</text>
  <text x="380" y="184" class="body">graph replay or `simulate()`</text>

  <rect x="640" y="108" width="730" height="116" rx="18" class="cardE"/>
  <text x="670" y="146" class="label">`simulate()` substep chain</text>
  <text x="670" y="174" class="code">state_0.clear_forces() -&gt; viewer.apply_forces(state_0) -&gt; model.collide(state_0, contacts)</text>
  <text x="670" y="198" class="code">-&gt; solver.step(state_0, state_1, control, contacts, sim_dt) -&gt; swap(state_0, state_1)</text>

  <path d="M 290 166 L 350 166" class="arrow"/>
  <path d="M 580 166 L 640 166" class="arrow"/>

  <rect x="70" y="284" width="190" height="84" rx="18" class="cardA"/>
  <text x="100" y="318" class="label">current read buffer</text>
  <text x="100" y="342" class="code">state_0</text>

  <rect x="330" y="284" width="190" height="84" rx="18" class="cardB"/>
  <text x="360" y="318" class="label">next write buffer</text>
  <text x="360" y="342" class="code">state_1</text>

  <rect x="590" y="272" width="360" height="96" rx="18" class="cardC"/>
  <text x="620" y="308" class="label">collision result for this substep</text>
  <text x="620" y="336" class="code">model.collide(state_0, contacts)</text>

  <rect x="1020" y="272" width="350" height="96" rx="18" class="cardD"/>
  <text x="1050" y="308" class="label">physics contract</text>
  <text x="1050" y="336" class="code">solver.step(state_0, state_1, control, contacts, dt)</text>

  <path d="M 190 212 L 165 284" class="arrow"/>
  <path d="M 860 224 L 760 272" class="arrow"/>
  <path d="M 980 320 L 1020 320" class="arrow"/>
  <path d="M 1195 224 L 425 284" class="arrow"/>

  <rect x="260" y="396" width="920" height="40" rx="16" class="band"/>
  <text x="720" y="422" text-anchor="middle" class="foot">swap 不是随手换变量名，而是在说：刚算出来的 next state 现在正式变成下一轮要读的 current state。</text>
</svg>
