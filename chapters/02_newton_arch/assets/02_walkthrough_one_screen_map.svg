<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="520" viewBox="0 0 1440 520" role="img" aria-labelledby="title desc">
  <title id="title">one-screen chapter map</title>
  <desc id="desc">A source-grounded chapter 02 map from python -m newton.examples basic_pendulum through launcher, Example.__init__, runtime object assembly, and the simulate loop.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 19px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
    .band { fill: #f8fafc; stroke: #8ca0bf; stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="520" fill="#ffffff"/>
  <text x="50" y="46" class="title">chapter 02 一屏总图：从 `python -m newton.examples basic_pendulum` 到一次 `solver.step(...)`</text>
  <text x="50" y="76" class="sub">保留精确文件和方法名，但把 viewer plumbing、graph capture 和 solver internals 暂时压扁成可读 first pass。</text>

  <rect x="50" y="118" width="280" height="98" rx="18" class="cardA"/>
  <text x="80" y="154" class="label">CLI entry</text>
  <text x="80" y="182" class="code">python -m newton.examples basic_pendulum</text>

  <rect x="380" y="118" width="300" height="98" rx="18" class="cardB"/>
  <text x="410" y="154" class="label">launcher route</text>
  <text x="410" y="182" class="body">`examples/__main__.py` -&gt; `examples.__init__.main()`</text>

  <rect x="730" y="118" width="310" height="98" rx="18" class="cardC"/>
  <text x="760" y="154" class="label">target module</text>
  <text x="760" y="182" class="code">newton.examples.basic.example_basic_pendulum</text>

  <rect x="1090" y="118" width="300" height="98" rx="18" class="cardD"/>
  <text x="1120" y="154" class="label">constructor handoff</text>
  <text x="1120" y="182" class="body">`Example.__init__()` starts scene assembly</text>

  <path d="M 330 167 L 380 167" class="arrow"/>
  <path d="M 680 167 L 730 167" class="arrow"/>
  <path d="M 1040 167 L 1090 167" class="arrow"/>

  <rect x="120" y="264" width="1200" height="112" rx="22" class="band"/>
  <text x="150" y="300" class="label">runtime stack assembled in `Example.__init__()`</text>
  <text x="150" y="328" class="body">`builder.finalize()` -&gt; `Model`; `model.state()` x2 -&gt; `state_0`, `state_1`; `model.control()` -&gt; `Control`</text>
  <text x="150" y="352" class="body">`eval_fk(model, model.joint_q, model.joint_qd, state_0)` fills initial body-space state; `model.contacts()` -&gt; `Contacts`; `SolverXPBD(model)` -&gt; `Solver`</text>

  <path d="M 1240 216 L 980 264" class="arrow"/>

  <rect x="50" y="412" width="220" height="64" rx="18" class="cardA"/>
  <text x="80" y="450" class="label">`examples.run()`</text>

  <rect x="320" y="412" width="220" height="64" rx="18" class="cardB"/>
  <text x="350" y="450" class="label">`Example.step()`</text>

  <rect x="590" y="400" width="800" height="88" rx="18" class="cardE"/>
  <text x="620" y="434" class="label">`simulate()` substep chain</text>
  <text x="620" y="462" class="code">clear_forces -&gt; apply_forces -&gt; model.collide(state_0, contacts) -&gt; solver.step(state_0, state_1, control, contacts, sim_dt) -&gt; swap</text>

  <path d="M 270 444 L 320 444" class="arrow"/>
  <path d="M 540 444 L 590 444" class="arrow"/>

  <text x="720" y="506" text-anchor="middle" class="foot">chapter 02 的 beginner pass 核心不是记住所有类名，而是把路由、组装和一次 step 的消费顺序连成同一条链。</text>
</svg>
