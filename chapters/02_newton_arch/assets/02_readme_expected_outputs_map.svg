<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 02 expected outputs map</title>
  <desc id="desc">A deliverables map showing the reusable study artifacts readers should leave chapter 02 with.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .core { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.8; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardD { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .bonus { fill: #ffffff; stroke: #c38ab9; stroke-width: 2.2; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1200" height="430" fill="#ffffff"/>
  <text x="50" y="46" class="title">Expected outputs: 读完 chapter 02 后最好留下哪些可复用产物</text>
  <text x="50" y="76" class="sub">这一章不该只留下“看过一次”的感觉，而应该沉淀成后续章节还能继续用的脚手架。</text>

  <rect x="430" y="152" width="340" height="120" rx="20" class="core"/>
  <text x="460" y="190" class="label">Chapter 02 学后中心成果</text>
  <text x="460" y="218" class="body">能把 basic_pendulum 的最小执行链</text>
  <text x="460" y="242" class="body">稳定地讲出来、对回源码、再继续往后读</text>

  <rect x="70" y="100" width="280" height="92" rx="16" class="cardA"/>
  <text x="100" y="132" class="label">四层主干关系图</text>
  <text x="100" y="156" class="body">Model / State / Control / Solver</text>
  <text x="100" y="180" class="body">以及 Contacts 的并列位置</text>

  <rect x="850" y="100" width="280" height="92" rx="16" class="cardB"/>
  <text x="880" y="132" class="label">examples 观察单</text>
  <text x="880" y="156" class="body">把 quick-win 命令改写成</text>
  <text x="880" y="180" class="body">“改哪里、看哪里”的入口</text>

  <rect x="70" y="270" width="280" height="92" rx="16" class="cardC"/>
  <text x="100" y="302" class="label">源码锚点清单</text>
  <text x="100" y="326" class="body">指出薄入口、真实 launcher</text>
  <text x="100" y="350" class="body">runtime objects 和 step 落点</text>

  <rect x="850" y="270" width="280" height="92" rx="16" class="cardD"/>
  <text x="880" y="302" class="label">口述最小讲解链</text>
  <text x="880" y="326" class="body">不看稿也能说清 examples 入口</text>
  <text x="880" y="350" class="body">一直到 solver step</text>

  <rect x="455" y="302" width="290" height="58" rx="16" class="bonus"/>
  <text x="485" y="337" class="label">Bonus: 8 个 solver 的 second-pass 地图</text>

  <path d="M 430 184 L 350 158" class="arrow"/>
  <path d="M 770 184 L 850 158" class="arrow"/>
  <path d="M 430 240 L 350 316" class="arrow"/>
  <path d="M 770 240 L 850 316" class="arrow"/>
  <path d="M 600 272 L 600 302" class="arrow"/>

  <text x="600" y="402" text-anchor="middle" class="foot">图、清单、观察任务和口述链，都会在后续 03 / 04 / 05 继续派上用场。</text>
</svg>
