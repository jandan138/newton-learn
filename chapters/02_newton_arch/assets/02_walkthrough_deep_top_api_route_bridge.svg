<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="380" viewBox="0 0 1440 380" role="img" aria-labelledby="title desc">
  <title id="title">top api and route bridge</title>
  <desc id="desc">A source-exact bridge showing the import newton public export path and the python -m newton.examples routing path converging at the concrete example module.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .lane { fill: #fbfcfe; stroke: #d7dfeb; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="380" fill="#ffffff"/>
  <text x="48" y="44" class="title">1. 顶层 API 与 examples 路由</text>
  <text x="48" y="74" class="sub">左边回答 `import newton` 先暴露哪些公共名字；右边回答 CLI short name 怎样被送到真实 example module。</text>

  <rect x="48" y="102" width="618" height="214" rx="20" class="lane"/>
  <text x="76" y="132" class="label">import lane</text>
  <rect x="76" y="154" width="170" height="72" rx="16" class="cardA"/>
  <text x="100" y="184" class="label">`import newton`</text>
  <text x="100" y="206" class="body">入口只是拿公共名</text>

  <rect x="286" y="144" width="160" height="92" rx="16" class="cardB"/>
  <text x="310" y="176" class="label">`newton/__init__.py`</text>
  <text x="310" y="198" class="body">re-export sim names</text>
  <text x="310" y="220" class="code">ModelBuilder / Model / State</text>

  <rect x="486" y="144" width="152" height="92" rx="16" class="cardC"/>
  <text x="510" y="176" class="label">`_src/sim/__init__.py`</text>
  <text x="510" y="198" class="body">真正聚合 sim symbols</text>
  <text x="510" y="220" class="code">Control / Contacts / eval_fk</text>

  <path d="M 246 190 L 286 190" class="arrow"/>
  <path d="M 446 190 L 486 190" class="arrow"/>

  <rect x="744" y="102" width="648" height="214" rx="20" class="lane"/>
  <text x="772" y="132" class="label">CLI route lane</text>
  <rect x="772" y="154" width="190" height="72" rx="16" class="cardA"/>
  <text x="796" y="184" class="label">`python -m newton.examples`</text>
  <text x="796" y="206" class="code">basic_pendulum</text>

  <rect x="994" y="144" width="160" height="92" rx="16" class="cardB"/>
  <text x="1018" y="176" class="label">`examples/__main__.py`</text>
  <text x="1018" y="198" class="body">only `from . import main`</text>
  <text x="1018" y="220" class="code">if __name__ == "__main__": main()</text>

  <rect x="1186" y="144" width="178" height="92" rx="16" class="cardC"/>
  <text x="1210" y="176" class="label">`examples.__init__.main()`</text>
  <text x="1210" y="198" class="code">get_examples()</text>
  <text x="1210" y="218" class="code">target_module = examples[name]</text>
  <text x="1210" y="238" class="code">runpy.run_module(...)</text>

  <path d="M 962 190 L 994 190" class="arrow"/>
  <path d="M 1154 190 L 1186 190" class="arrow"/>

  <rect x="450" y="320" width="540" height="40" rx="16" class="cardD"/>
  <text x="720" y="346" text-anchor="middle" class="label">汇合点: `newton.examples.basic.example_basic_pendulum` 作为新的 `__main__` 被执行</text>

  <path d="M 638 236 L 640 320" class="arrow"/>
  <path d="M 1276 236 L 800 320" class="arrow"/>

  <text x="720" y="376" text-anchor="middle" class="foot">public surface 在说“先认哪些名字”；launcher route 在说“怎么跳到具体 module”；这两件事不是同一层职责。</text>
</svg>
