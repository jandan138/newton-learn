<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc">
  <title id="title">outer and inner loop bridge</title>
  <desc id="desc">A source-exact steady-state branch map from examples.run to Example.step to Example.simulate, showing the outer viewer loop and the inner substep chain.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .band { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="420" fill="#ffffff"/>
  <text x="48" y="44" class="title">4. 外层 run loop 与内层 substep chain</text>
  <text x="48" y="74" class="sub">这里画的是 `run()` 的 steady-state hot path: viewer 还在运行、example 已存在、没有 browser switch/reset。</text>

  <rect x="70" y="118" width="284" height="106" rx="18" class="cardA"/>
  <text x="98" y="154" class="label">outer `examples.run()`</text>
  <text x="98" y="178" class="code">while viewer.is_running()</text>
  <text x="98" y="198" class="code">if not viewer.is_paused(): example.step()</text>
  <text x="98" y="218" class="code">example.render()</text>

  <rect x="414" y="118" width="300" height="106" rx="18" class="cardB"/>
  <text x="442" y="154" class="label">frame wrapper `Example.step()`</text>
  <text x="442" y="178" class="code">if self.graph: wp.capture_launch(self.graph)</text>
  <text x="442" y="198" class="code">else: self.simulate()</text>
  <text x="442" y="218" class="code">self.sim_time += self.frame_dt</text>

  <rect x="774" y="106" width="596" height="130" rx="18" class="band"/>
  <text x="806" y="146" class="label">inner substep chain in `simulate()`</text>
  <text x="806" y="170" class="code">for _ in range(self.sim_substeps):</text>
  <text x="806" y="194" class="code">state_0.clear_forces() -&gt; viewer.apply_forces(state_0) -&gt; model.collide(state_0, contacts)</text>
  <text x="806" y="218" class="code">-&gt; solver.step(state_0, state_1, control, contacts, sim_dt) -&gt; state_0, state_1 = state_1, state_0</text>

  <path d="M 354 170 L 414 170" class="arrow"/>
  <path d="M 714 170 L 774 170" class="arrow"/>

  <rect x="110" y="284" width="228" height="80" rx="18" class="cardA"/>
  <text x="138" y="316" class="label">`run()` cares about timing</text>
  <text x="138" y="338" class="body">viewer lifecycle, pause gate, render</text>

  <rect x="482" y="284" width="228" height="80" rx="18" class="cardB"/>
  <text x="510" y="316" class="label">`step()` is a wrapper</text>
  <text x="510" y="338" class="body">graph replay or one `simulate()` call</text>

  <rect x="854" y="272" width="410" height="92" rx="18" class="cardC"/>
  <text x="882" y="304" class="label">`simulate()` is the real physics handoff</text>
  <text x="882" y="328" class="body">force clear, external force injection, collide, solver.step, then double-buffer swap</text>
  <text x="882" y="350" class="body">chapter 02 真正要背下来的内层链只在这里展开。</text>

  <path d="M 562 224 L 596 284" class="arrow"/>
  <path d="M 1096 236 L 1058 272" class="arrow"/>

  <text x="720" y="404" text-anchor="middle" class="foot">把 `run()`、`Example.step()`、`solver.step()` 三层都叫 step 很正常; 关键是先认清它们分属调度层、frame wrapper、physics contract 三个不同位置。</text>
</svg>
