<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="360" viewBox="0 0 1420 360" role="img" aria-labelledby="title desc">
  <title id="title">examples page relationships map</title>
  <desc id="desc">A page relationships map showing how examples.md works with principle.md and source-walkthrough.md in chapter 02.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 22px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1420" height="360" fill="#ffffff"/>
  <text x="50" y="46" class="title">`examples.md` 不是第二份原理页，也不是第二份源码 walkthrough</text>
  <text x="50" y="76" class="sub">它的任务只是把 quick-win 命令改写成观察单，再把你送回该去的文件。</text>

  <rect x="60" y="126" width="360" height="144" rx="18" class="cardA"/>
  <text x="90" y="162" class="label">`principle.md`</text>
  <text x="90" y="190" class="body">负责回答“为什么 chapter 02 要先讲这条链”</text>
  <text x="90" y="214" class="body">先给对象分工和架构主线的意义</text>

  <rect x="530" y="104" width="360" height="168" rx="18" class="cardB"/>
  <text x="560" y="140" class="label">`examples.md`</text>
  <text x="560" y="168" class="body">负责把三条命令变成“先跑、再改、再观察”</text>
  <text x="560" y="192" class="body">每次只改一个量，再回问它落在哪一层</text>
  <text x="560" y="216" class="body">这页本身不展开全部原理，也不重走源码</text>

  <rect x="1000" y="126" width="360" height="144" rx="18" class="cardC"/>
  <text x="1030" y="162" class="label">`source-walkthrough.md`</text>
  <text x="1030" y="190" class="body">负责把你刚观察到的现象钉回真实源码路径</text>
  <text x="1030" y="214" class="body">重点追 launcher、runtime objects 和 `simulate()`</text>

  <path d="M 420 198 L 530 188" class="arrow"/>
  <path d="M 890 188 L 1000 198" class="arrow"/>

  <text x="710" y="326" text-anchor="middle" class="foot">最省力的读法是：先用 `principle.md` 建立词义，再来这页做观察任务，最后回 `source-walkthrough.md` 对源码锚点。</text>
</svg>
