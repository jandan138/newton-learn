<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 02 goals poster</title>
  <desc id="desc">A concise poster showing the three goals of chapter 02 and the intended level of depth.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 22px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="#ffffff"/>
  <text x="50" y="46" class="title">Chapter 02 goals: 先搭骨架，再决定哪里值得深挖</text>
  <text x="50" y="76" class="sub">重点是组织关系与最小执行链，不是一次吃完整个 Newton solver 世界。</text>

  <rect x="60" y="120" width="320" height="150" rx="18" class="cardA"/>
  <text x="90" y="156" class="label">1. 拉通最小执行链</text>
  <text x="90" y="184" class="body">examples 入口 -> 公共 API</text>
  <text x="90" y="208" class="body">-> 四层主干 + Contacts -> step</text>
  <text x="90" y="232" class="body">先能顺着 basic_pendulum 讲下来</text>

  <rect x="440" y="120" width="320" height="150" rx="18" class="cardB"/>
  <text x="470" y="156" class="label">2. 建立对象心智模型</text>
  <text x="470" y="184" class="body">知道每层对象负责什么</text>
  <text x="470" y="208" class="body">知道 Contacts 为何并列进入 loop</text>
  <text x="470" y="232" class="body">不把它们读成一团近义词</text>

  <rect x="820" y="120" width="320" height="150" rx="18" class="cardC"/>
  <text x="850" y="156" class="label">3. solver 只保留地图感</text>
  <text x="850" y="184" class="body">8 个 solver 作为 second pass 导航</text>
  <text x="850" y="208" class="body">这轮不要求啃 solver internals</text>
  <text x="850" y="232" class="body">避免 first pass 失焦</text>

  <path d="M 380 195 L 440 195" class="arrow"/>
  <path d="M 760 195 L 820 195" class="arrow"/>

  <text x="600" y="320" text-anchor="middle" class="foot">本章要的是架构骨架和定位能力，不是一次讲完所有实现细节。</text>
</svg>
