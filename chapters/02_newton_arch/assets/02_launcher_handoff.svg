<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#ffffff"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Chapter 02 launcher handoff</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Accurate split: CLI entry -> router -> runpy handoff -> target example module</text>

  <rect x="40" y="110" width="220" height="120" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="62" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#312e81">CLI</text>
  <text x="62" y="174" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">python -m</text>
  <text x="62" y="198" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">newton.examples</text>
  <text x="62" y="222" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">basic_pendulum</text>

  <rect x="300" y="110" width="240" height="120" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="322" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">examples/__main__.py</text>
  <text x="322" y="174" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">__name__ == "__main__"</text>
  <text x="322" y="198" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">from . import main</text>
  <text x="322" y="222" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">main()</text>

  <rect x="580" y="110" width="260" height="120" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="602" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">examples.__init__.main()</text>
  <text x="602" y="174" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">get_examples()</text>
  <text x="602" y="198" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">target_module = examples[name]</text>
  <text x="602" y="222" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">sys.argv = [target_module, ...]</text>

  <rect x="880" y="110" width="280" height="120" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="902" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#047857">runpy handoff</text>
  <text x="902" y="174" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">runpy.run_module(</text>
  <text x="902" y="198" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">  target_module,</text>
  <text x="902" y="222" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">  run_name="__main__")</text>

  <rect x="310" y="260" width="560" height="70" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="332" y="288" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#c2410c">Target module: example_basic_pendulum.py</text>
  <text x="332" y="314" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">__name__ == "__main__" again -> Example(viewer, args) -> newton.examples.run(example, args)</text>

  <line x1="260" y1="170" x2="300" y2="170" stroke="#6b7280" stroke-width="3"/>
  <polygon points="300,170 288,164 288,176" fill="#6b7280"/>
  <line x1="540" y1="170" x2="580" y2="170" stroke="#6b7280" stroke-width="3"/>
  <polygon points="580,170 568,164 568,176" fill="#6b7280"/>
  <line x1="840" y1="170" x2="880" y2="170" stroke="#6b7280" stroke-width="3"/>
  <polygon points="880,170 868,164 868,176" fill="#6b7280"/>
  <line x1="1020" y1="230" x2="870" y2="290" stroke="#6b7280" stroke-width="3"/>
  <polygon points="870,290 879,280 884,292" fill="#6b7280"/>

  <text x="66" y="320" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Note: the outer run loop later calls example.step() and example.render().</text>
</svg>
