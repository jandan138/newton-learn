<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <rect width="1200" height="300" fill="#ffffff"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">basic_pendulum joint chain</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Core-pass reading: world anchor -> j0 -> link_0 -> j1 -> link_1</text>

  <circle cx="110" cy="160" r="20" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="70" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">world</text>
  <text x="38" y="230" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">parent = -1</text>
  <text x="30" y="252" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">anchor p = (0, 0, 5)</text>

  <rect x="250" y="120" width="190" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="322" y="148" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#312e81">j0</text>
  <text x="270" y="174" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">axis = (0, 1, 0)</text>

  <rect x="500" y="120" width="210" height="70" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="575" y="148" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f766e">link_0</text>
  <text x="520" y="174" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">child_xform.q = identity</text>

  <rect x="780" y="120" width="190" height="70" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="852" y="148" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">j1</text>
  <text x="800" y="174" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">parent = link_0</text>

  <rect x="1010" y="120" width="150" height="70" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1052" y="148" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b45309">link_1</text>
  <text x="1030" y="174" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">child side</text>

  <line x1="130" y1="160" x2="250" y2="160" stroke="#6b7280" stroke-width="4"/>
  <polygon points="250,160 238,154 238,166" fill="#6b7280"/>
  <line x1="440" y1="160" x2="500" y2="160" stroke="#6b7280" stroke-width="4"/>
  <polygon points="500,160 488,154 488,166" fill="#6b7280"/>
  <line x1="710" y1="160" x2="780" y2="160" stroke="#6b7280" stroke-width="4"/>
  <polygon points="780,160 768,154 768,166" fill="#6b7280"/>
  <line x1="970" y1="160" x2="1010" y2="160" stroke="#6b7280" stroke-width="4"/>
  <polygon points="1010,160 998,154 998,166" fill="#6b7280"/>

  <rect x="250" y="220" width="460" height="44" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="272" y="248" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">j0 also sets parent_xform.q = rot, which turns the whole chain sideways to the viewer.</text>

  <rect x="780" y="220" width="310" height="44" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="802" y="248" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Core pass: stop here; leave joint-frame algebra for later.</text>
</svg>
