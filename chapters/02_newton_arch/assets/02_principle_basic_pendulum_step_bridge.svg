<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="410" viewBox="0 0 1440 410" role="img" aria-labelledby="title desc">
  <title id="title">basic_pendulum to one Newton step</title>
  <desc id="desc">A minimal execution bridge from the basic_pendulum example entry through public API names to runtime objects and solver step.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1440" height="410" fill="#ffffff"/>
  <text x="50" y="46" class="title">`basic_pendulum` 的最小主链：从 example 名字，走到一次 `solver.step()`</text>
  <text x="50" y="76" class="sub">概念上先认 handoff；源码级细节再留给 `source-walkthrough.md`。</text>

  <rect x="50" y="130" width="250" height="136" rx="18" class="cardA"/>
  <text x="80" y="166" class="label">`basic_pendulum`</text>
  <text x="80" y="193" class="body">同一 examples 入口下的最小场景</text>
  <text x="80" y="217" class="body">先把“我要模拟什么”说清楚</text>
  <text x="80" y="241" class="body">不是全部 Newton，只是最好抓手</text>

  <rect x="340" y="130" width="250" height="136" rx="18" class="cardB"/>
  <text x="370" y="166" class="label">公共 API 表面</text>
  <text x="370" y="193" class="body">先认 `Model`、`State`、`Control`、`Solver`</text>
  <text x="370" y="217" class="body">决定第一次阅读该抓哪些名字</text>
  <text x="370" y="241" class="body">而不是先扑进内部模块树</text>

  <rect x="630" y="104" width="300" height="162" rx="18" class="cardC"/>
  <text x="660" y="140" class="label">当前拍 runtime objects</text>
  <text x="660" y="167" class="body">`Model`: 静态世界与连接关系</text>
  <text x="660" y="191" class="body">`State`: 这一拍的系统快照</text>
  <text x="660" y="215" class="body">`Control`: 这一拍可能施加的输入</text>
  <text x="660" y="239" class="body">这三者先够你讲顺一次 step</text>

  <rect x="630" y="293" width="300" height="72" rx="18" class="cardE"/>
  <text x="660" y="325" class="label">`Contacts`</text>
  <text x="660" y="349" class="body">并列 handoff：这一拍碰撞后得到的结果缓冲区</text>

  <rect x="1000" y="130" width="340" height="136" rx="18" class="cardD"/>
  <text x="1030" y="166" class="label">`simulate()` -> `solver.step()`</text>
  <text x="1030" y="193" class="body">读取 `Model`、当前 `State`、可能的 `Control`</text>
  <text x="1030" y="217" class="body">再接住 `Contacts` 这拍的碰撞结果</text>
  <text x="1030" y="241" class="body">把系统推进到下一拍的 `State`</text>

  <path d="M 300 198 L 340 198" class="arrow"/>
  <path d="M 590 198 L 630 186" class="arrow"/>
  <path d="M 930 186 L 1000 198" class="arrow"/>
  <path d="M 930 329 L 1000 230" class="arrow"/>

  <text x="720" y="392" text-anchor="middle" class="foot">先用一个最小例子把入口、对象与一步推进连成同一条链，后面再去追更细的文件 handoff。</text>
</svg>
