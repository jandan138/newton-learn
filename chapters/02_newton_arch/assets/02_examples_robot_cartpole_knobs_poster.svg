<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="390" viewBox="0 0 1400 390" role="img" aria-labelledby="title desc">
  <title id="title">robot_cartpole knobs poster</title>
  <desc id="desc">A poster of the main robot_cartpole knobs to vary: world_count, spacing, and joint_q initialization.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 15px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #214d3e; }
    .cardA { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardB { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardC { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
  </style>

  <rect width="1400" height="390" fill="#ffffff"/>
  <text x="50" y="46" class="title">改 `robot_cartpole` 时，优先用这三个旋钮练“看懂复制”</text>
  <text x="50" y="76" class="sub">每次只改一个量，再问它改变的是模板数量、world 排布，还是每个 world 内部的初始状态。</text>

  <rect x="50" y="120" width="400" height="198" rx="18" class="cardA"/>
  <text x="82" y="158" class="label">旋钮 1: `--world-count`</text>
  <text x="82" y="188" class="code">1 / 10 / 100</text>
  <text x="82" y="218" class="body">最该观察的是“同一模板被复制多少份”，</text>
  <text x="82" y="242" class="body">不是单个 cartpole 的动力学突然换了规则。</text>

  <rect x="500" y="120" width="400" height="198" rx="18" class="cardB"/>
  <text x="532" y="158" class="label">旋钮 2: `spacing=(1.0, 2.0, 0.0)`</text>
  <text x="532" y="188" class="body">它主要改变 world 之间如何排开，</text>
  <text x="532" y="212" class="body">最适合帮你把“布局”与“动力学”分开看。</text>

  <rect x="950" y="120" width="400" height="198" rx="18" class="cardC"/>
  <text x="982" y="158" class="label">旋钮 3: `cartpole.joint_q[-3:]`</text>
  <text x="982" y="188" class="code">`[0.0, 0.3, 0.0]`</text>
  <text x="982" y="218" class="body">这是最快能看到“很多 world 共享同类初值”</text>
  <text x="982" y="242" class="body">而架构链本身并没有跟着改写的一刀。</text>
</svg>
