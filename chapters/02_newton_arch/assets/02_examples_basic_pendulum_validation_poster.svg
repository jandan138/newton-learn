<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">basic_pendulum validation poster</title>
  <desc id="desc">A validation poster for the main example, highlighting the three checks this example is best at validating for chapter 02.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 21px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .tick { font: 700 22px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #1f7a55; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardC { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
  </style>

  <rect width="1400" height="360" fill="#ffffff"/>
  <text x="50" y="46" class="title">拿 `basic_pendulum` 先验证三件事就够了</text>
  <text x="50" y="76" class="sub">它最适合做 first-pass 检查表，不适合一口气承包 USD、批量 world 或 solver family 对比。</text>

  <rect x="50" y="120" width="400" height="172" rx="18" class="cardA"/>
  <text x="82" y="158" class="tick">01</text>
  <text x="130" y="158" class="label">最小链有没有读顺</text>
  <text x="82" y="188" class="body">能不能把 example 入口、公共对象、</text>
  <text x="82" y="212" class="body">`Contacts` handoff 和一次 `step` 连成一句话。</text>

  <rect x="500" y="120" width="400" height="172" rx="18" class="cardB"/>
  <text x="532" y="158" class="tick">02</text>
  <text x="580" y="158" class="label">构造与推进有没有分开看</text>
  <text x="532" y="188" class="body">`Example.__init__()` 负责搭世界，</text>
  <text x="532" y="212" class="body">`simulate()` 负责每个 substep 的接力。</text>

  <rect x="950" y="120" width="400" height="172" rx="18" class="cardC"/>
  <text x="982" y="158" class="tick">03</text>
  <text x="1030" y="158" class="label">最小 articulation 有没有站稳</text>
  <text x="982" y="188" class="body">先看懂一个双关节刚体链为什么能跑，</text>
  <text x="982" y="212" class="body">再决定要不要去读更重的 scene 和 solver 分支。</text>
</svg>
