<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="460" viewBox="0 0 1300 460" role="img" aria-labelledby="title desc">
  <title id="title">GAMES103 versus chapter 02 delta poster</title>
  <desc id="desc">A side-by-side comparison showing what readers may already have from GAMES103 and what chapter 02 specifically adds in Newton.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 20px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 16px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .head { font: 700 23px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .foot { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .tag { fill: #ffffff; stroke: #8ca0bf; stroke-width: 2.2; }
    .left { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
    .right { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .arrow { stroke: #667c9f; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667c9f"/>
    </marker>
  </defs>

  <rect width="1300" height="460" fill="#ffffff"/>
  <text x="50" y="46" class="title">GAMES103 已有 vs 本章新增：从通用仿真视角走到 Newton 真实入口</text>
  <text x="50" y="76" class="sub">左边是已经熟悉的抽象感，右边是 chapter 02 新加上的工程落点。</text>

  <text x="270" y="115" text-anchor="middle" class="head">GAMES103 已有</text>
  <text x="965" y="115" text-anchor="middle" class="head">本章新增</text>

  <rect x="50" y="138" width="130" height="78" rx="16" class="tag"/>
  <text x="115" y="170" text-anchor="middle" class="label">物理 / 数学</text>
  <text x="115" y="194" text-anchor="middle" class="body">视角</text>
  <rect x="210" y="138" width="330" height="78" rx="16" class="left"/>
  <text x="240" y="170" class="body">知道仿真会分模型、状态、积分与约束求解</text>
  <text x="240" y="194" class="body">但还停在抽象对象层</text>
  <rect x="650" y="138" width="580" height="78" rx="16" class="right"/>
  <text x="680" y="170" class="body">把这些抽象对象压到 Newton 的真实 API、example 入口</text>
  <text x="680" y="194" class="body">以及四层主干 + Contacts handoff 上</text>
  <path d="M 540 177 L 650 177" class="arrow"/>

  <rect x="50" y="236" width="130" height="78" rx="16" class="tag"/>
  <text x="115" y="268" text-anchor="middle" class="label">Newton 工程</text>
  <text x="115" y="292" text-anchor="middle" class="body">视角</text>
  <rect x="210" y="236" width="330" height="78" rx="16" class="left"/>
  <text x="240" y="268" class="body">对具体代码库组织通常没有要求</text>
  <text x="240" y="292" class="body">也不知道从哪里真正下手读</text>
  <rect x="650" y="236" width="580" height="78" rx="16" class="right"/>
  <text x="680" y="268" class="body">先看 newton/__init__.py 暴露什么，再看 examples 怎样把它们串起来</text>
  <text x="680" y="292" class="body">把“抽象概念”变成“真实文件和入口”</text>
  <path d="M 540 275 L 650 275" class="arrow"/>

  <rect x="50" y="334" width="130" height="78" rx="16" class="tag"/>
  <text x="115" y="366" text-anchor="middle" class="label">GPU / Warp</text>
  <text x="115" y="390" text-anchor="middle" class="body">视角</text>
  <rect x="210" y="334" width="330" height="78" rx="16" class="left"/>
  <text x="240" y="366" class="body">对 GPU 数据布局和 kernel 调度着墨较少</text>
  <text x="240" y="390" class="body">不会自然想到 solver 家族入口</text>
  <rect x="650" y="334" width="580" height="78" rx="16" class="right"/>
  <text x="680" y="366" class="body">知道 Newton 不是单一 solver 教具，而是一组基于 Warp 的 solver 家族入口</text>
  <text x="680" y="390" class="body">chapter 02 先给地图感，后续章节再展开细节</text>
  <path d="M 540 373 L 650 373" class="arrow"/>

  <text x="650" y="440" text-anchor="middle" class="foot">本章真正新增的是“把已有物理直觉对到 Newton 的真实工程落点”。</text>
</svg>
