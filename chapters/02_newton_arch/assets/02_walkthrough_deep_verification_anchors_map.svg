<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="350" viewBox="0 0 1360 350" role="img" aria-labelledby="title desc">
  <title id="title">verification anchors map</title>
  <desc id="desc">A source-exact claim-to-file map for verifying public exports, thin launcher forwarding, example routing, constructor runtime assembly, outer and inner loop split, and solver contract inputs.</desc>
  <style>
    .title { font: 700 28px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .sub { font: 400 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #49617c; }
    .label { font: 700 18px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #172033; }
    .body { font: 400 15px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #3f536d; }
    .code { font: 700 14px "JetBrains Mono","DejaVu Sans Mono","Noto Sans Mono CJK SC",monospace; fill: #24406a; }
    .foot { font: 400 17px "Noto Sans SC","Noto Sans CJK SC","Microsoft YaHei","PingFang SC","Source Han Sans SC","WenQuanYi Zen Hei","DejaVu Sans",Arial,sans-serif; fill: #5a6d87; }
    .cardA { fill: #eef5ff; stroke: #7c99cb; stroke-width: 2.5; }
    .cardB { fill: #f6f0ff; stroke: #a287d3; stroke-width: 2.5; }
    .cardC { fill: #eefaf5; stroke: #72ac93; stroke-width: 2.5; }
    .cardD { fill: #fff5ea; stroke: #d59b62; stroke-width: 2.5; }
    .cardE { fill: #f7f9fc; stroke: #8ca0bf; stroke-width: 2.5; }
  </style>

  <rect width="1360" height="350" fill="#ffffff"/>
  <text x="44" y="44" class="title">Verification Anchors: claim -&gt; 直接打开哪里</text>
  <text x="44" y="74" class="sub">这张图不替代表格; 它只是把最常回查的六个 claim 按文件入口重新分组。</text>

  <rect x="44" y="110" width="398" height="84" rx="18" class="cardA"/>
  <text x="70" y="142" class="label">public API 只是 re-export 目录</text>
  <text x="70" y="166" class="code">`newton/__init__.py`, `newton/_src/sim/__init__.py`</text>

  <rect x="482" y="110" width="398" height="84" rx="18" class="cardB"/>
  <text x="508" y="142" class="label">`examples/__main__.py` 只是薄转发</text>
  <text x="508" y="166" class="code">`from . import main`; `main()`</text>

  <rect x="920" y="110" width="398" height="84" rx="18" class="cardC"/>
  <text x="946" y="142" class="label">真正的 route 在 `examples.__init__.py`</text>
  <text x="946" y="166" class="code">`get_examples()` / `main()` / `runpy.run_module(...)`</text>

  <rect x="118" y="222" width="398" height="84" rx="18" class="cardD"/>
  <text x="144" y="254" class="label">constructor 一次性组 runtime stack</text>
  <text x="144" y="278" class="code">`example_basic_pendulum.py:Example.__init__()`</text>

  <rect x="560" y="222" width="398" height="84" rx="18" class="cardE"/>
  <text x="586" y="254" class="label">`run()` 和 `simulate()` 分层</text>
  <text x="586" y="278" class="code">`examples.__init__.py:run()` + `example_basic_pendulum.py:simulate()`</text>

  <rect x="1002" y="222" width="258" height="84" rx="18" class="cardA"/>
  <text x="1028" y="254" class="label">solver contract</text>
  <text x="1028" y="278" class="code">`SolverBase.step(...)` inputs</text>

  <text x="680" y="342" text-anchor="middle" class="foot">如果某个 claim 现在讲不顺, 先回到对应文件核对一遍, 再回来继续 deep sheet; 这样最不容易把好几个层次混成一个大概念。</text>
</svg>
